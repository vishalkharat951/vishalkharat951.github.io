<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZipStore — Admin Login</title>
<link rel="preconnect" href="https://zip-backend-myp0.onrender.com" crossorigin>
<link rel="dns-prefetch" href="https://zip-backend-myp0.onrender.com">
<link rel="preconnect" href="https://placehold.co">
<link rel="stylesheet" href="css/global.css">
</head>
<body class="login-body">
<div class="login-card">
<h1>ZipStore</h1>
<p>Admin dashboard login</p>
<form id="login-form">
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" required placeholder="admin@zipstore.com">
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" required placeholder="Enter your password">
</div>
<button type="submit" class="btn btn-secondary btn-block">Sign In</button>
<p id="login-error" style="color:var(--color-error);font-size:var(--font-size-sm);margin-top:var(--space-3);text-align:center;display:none"></p>
</form>
<p style="margin-top:var(--space-6);text-align:center;font-size:var(--font-size-xs);color:var(--color-text-secondary)">
<a href="index.html" style="color:var(--color-primary)">Back to store</a>
</p>
</div>
<script>
const API_BASE_URL = 'https://zip-backend-myp0.onrender.com/api';
const form = document.getElementById('login-form');
const errorEl = document.getElementById('login-error');
const token = localStorage.getItem('zipstore_token');
if (token) {
window.location.href = 'admin.html';
}
form.addEventListener('submit', async (e) => {
e.preventDefault();
errorEl.style.display = 'none';
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
try {
const res = await fetch(`${API_BASE_URL}/auth/login`, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email, password }),
});
if (!res.ok) {
const data = await res.json();
throw new Error(data.error || 'Login failed');
}
const data = await res.json();
localStorage.setItem('zipstore_token', data.token);
localStorage.setItem('zipstore_user', JSON.stringify(data.user));
window.location.href = 'admin.html';
} catch (err) {
errorEl.textContent = err.message;
errorEl.style.display = 'block';
}
});
</script>
</body>
</html>
