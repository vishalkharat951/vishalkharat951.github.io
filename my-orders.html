<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZipStore — My Orders</title>
<link rel="preconnect" href="https://zip-backend-myp0.onrender.com" crossorigin>
<link rel="dns-prefetch" href="https://zip-backend-myp0.onrender.com">
<link rel="preconnect" href="https://placehold.co">
<link rel="stylesheet" href="css/global.css">
</head>
<body>
<nav class="navbar">
<div class="container">
<a href="index.html" class="navbar-brand">ZipStore</a>
<ul class="navbar-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
</ul>
<div class="navbar-actions">
<a href="cart.html" class="cart-icon" aria-label="Shopping cart">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
<span class="cart-count">0</span>
</a>
<button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
</div>
</div>
</nav>
<div class="container" style="padding-top:var(--space-8);padding-bottom:var(--space-8)">
<div id="orders-view">
<div class="loading" id="loading">
<div class="spinner"></div>
<p>Loading orders...</p>
</div>
</div>
</div>
<footer class="footer">
<div class="container">
<p>&copy; 2026 ZipStore. All rights reserved.</p>
</div>
</footer>
<div class="toast" id="toast"></div>
<script src="js/cart.js"></script>
<script>
function showToast(msg, type) {
const el = document.getElementById('toast');
el.textContent = msg;
el.className = 'toast ' + (type || '');
el.classList.add('show');
setTimeout(() => el.classList.remove('show'), 2500);
}
const ORDER_STATUSES = ['pending', 'confirmed', 'packed', 'shipped', 'delivered', 'cancelled'];
function getStatusBadge(status) {
return `<span class="status-badge status-${status}">${status}</span>`;
}
async function loadOrders() {
const view = document.getElementById('orders-view');
const loading = document.getElementById('loading');
const token = localStorage.getItem('zipstore_token');
if (!token) {
loading.style.display = 'none';
view.innerHTML = `
<div class="cart-empty">
<h2>Please Log In</h2>
<p>You need to log in to view your orders.</p>
<a href="login.html" class="btn btn-secondary" style="margin-top:var(--space-4)">Log In</a>
</div>
`;
return;
}
try {
const res = await fetch(API_BASE_URL + '/orders/my', {
headers: { Authorization: 'Bearer ' + token },
});
if (!res.ok) {
if (res.status === 401) {
localStorage.removeItem('zipstore_token');
window.location.href = 'login.html';
return;
}
throw new Error('Failed to load orders');
}
const data = await res.json();
const orders = data.orders || data;
loading.style.display = 'none';
const params = new URLSearchParams(window.location.search);
const paymentStatus = params.get('payment');
if (paymentStatus === 'success') {
showToast('Payment successful! Order confirmed.', 'success');
window.history.replaceState({}, '', 'my-orders.html');
}
if (!orders.length) {
view.innerHTML = `
<h1 style="margin-bottom:var(--space-6)">My Orders</h1>
<div class="cart-empty">
<h2>No orders yet</h2>
<p>You haven&rsquo;t placed any orders.</p>
<a href="shop.html" class="btn btn-secondary" style="margin-top:var(--space-4)">Start Shopping</a>
</div>
`;
return;
}
view.innerHTML = `
<div style="max-width:800px;margin:0 auto">
<h1 style="margin-bottom:var(--space-8);font-size:var(--font-size-3xl);font-weight:800;letter-spacing:-0.02em;display:flex;align-items:center;gap:var(--space-3)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>My Orders</h1>
${orders.map((o, oi) => {
const date = new Date(o.createdAt).toLocaleDateString('en-US', {
year: 'numeric', month: 'long', day: 'numeric',
});
const deliveryDate = new Date(o.createdAt);
deliveryDate.setDate(deliveryDate.getDate() + 4);
const deliveryDateStr = deliveryDate.toLocaleDateString('en-US', {
year: 'numeric', month: 'long', day: 'numeric',
});
const itemsTotal = o.items.reduce((s, i) => s + (i.price * i.quantity), 0);
return `
<div class="admin-section" style="margin-bottom:var(--space-5);border-radius:var(--radius-xl);border:1px solid var(--color-border);overflow:hidden;transition:box-shadow 200ms ease" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow='var(--shadow-sm)'">
<div style="background:linear-gradient(135deg,var(--color-primary),#818cf8);padding:var(--space-4) var(--space-5);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-3)">
<div style="display:flex;align-items:center;gap:var(--space-3)">
<div style="width:40px;height:40px;border-radius:var(--radius-md);background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:var(--font-size-lg);color:#fff">#${o._id.slice(-4)}</div>
<div>
<div style="font-weight:700;color:#fff;font-size:var(--font-size-base)">Order #${o._id.slice(-8)}</div>
<div style="font-size:var(--font-size-xs);color:rgba(255,255,255,0.8)">${date}</div>
</div>
</div>
<div style="display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap">
${getStatusBadge(o.orderStatus)}
</div>
</div>
<div style="padding:var(--space-5)">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4);flex-wrap:wrap;gap:var(--space-2)">
<div style="display:flex;align-items:center;gap:var(--space-2)">
<span style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">Payment:</span>
${getStatusBadge(o.paymentStatus)}
</div>
<span style="display:inline-flex;align-items:center;gap:var(--space-1);padding:2px 10px;background:#e8f5e9;color:#2e7d32;border-radius:var(--radius-sm);font-size:var(--font-size-xs);font-weight:600"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Est. delivery ${deliveryDateStr}</span>
</div>
<div style="border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden">
<div style="background:var(--color-bg);padding:var(--space-2) var(--space-4);font-size:var(--font-size-xs);font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--color-border)">Items</div>
${o.items.map(item => `
<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-border);font-size:var(--font-size-sm)">
<span>${item.productId?.title || 'Product'} <span style="color:var(--color-text-secondary)">x${item.quantity}</span></span>
<span style="font-weight:600">₹${(item.price * item.quantity).toFixed(2)}</span>
</div>
`).join('')}
<div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-3) var(--space-4);background:var(--color-primary-light);font-weight:700;font-size:var(--font-size-base)">
<span>Total</span>
<span style="color:var(--color-primary)">₹${Number(o.totalAmount || itemsTotal).toFixed(2)}</span>
</div>
</div>
<details style="margin-top:var(--space-4)">
<summary style="cursor:pointer;font-size:var(--font-size-sm);color:var(--color-text-secondary);font-weight:500;display:flex;align-items:center;gap:var(--space-2)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Shipping Details</summary>
<div style="padding:var(--space-4);background:var(--color-bg);border-radius:var(--radius-md);margin-top:var(--space-3);font-size:var(--font-size-sm);line-height:1.8">
<strong>${o.shippingAddress?.name || o.userId?.name || ''}</strong>${o.shippingAddress?.phone ? '<br>' + o.shippingAddress.phone : ''}<br>
${o.shippingAddress?.street || ''}<br>
${o.shippingAddress?.city || ''}${o.shippingAddress?.state ? ', ' + o.shippingAddress.state : ''}
${o.transactionId ? `<br><span style="color:var(--color-text-secondary);font-size:var(--font-size-xs)">Transaction: ${o.transactionId}</span>` : ''}
</div>
</details>
</div>
</div>
`;
}).join('')}
</div>
`;
} catch (err) {
loading.style.display = 'none';
view.innerHTML = `
<div class="cart-empty">
<h2>Something went wrong</h2>
<p>${err.message}</p>
<button class="btn btn-secondary" style="margin-top:var(--space-4)" onclick="loadOrders()">Try Again</button>
</div>
`;
}
}
document.addEventListener('DOMContentLoaded', () => {
loadOrders();
});
</script>
</body>
</html>
